<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Shield Buddy</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #0a0a0f;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ---- 浮动数字 ---- */
    .float-num {
      position: fixed; pointer-events: none; font-weight: 900;
      animation: floatUp .9s cubic-bezier(.15,.6,.35,1) forwards; z-index: 99;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(.6); opacity: 0; }
      15%  { transform: translateY(-10px) scale(1.2); opacity: 1; }
      30%  { transform: translateY(-30px) scale(1); opacity: 1; }
      100% { transform: translateY(-100px) scale(.8); opacity: 0; }
    }
    @keyframes floatUpCrit {
      0%   { transform: translateY(0) scale(.3) rotate(-10deg); opacity: 0; }
      15%  { transform: translateY(-8px) scale(1.4) rotate(3deg); opacity: 1; }
      30%  { transform: translateY(-25px) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110px) scale(.9); opacity: 0; }
    }

    /* ---- Token 总量 ---- */
    .total-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 20px 24px; padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: linear-gradient(0deg, rgba(10,10,15,.95) 60%, rgba(10,10,15,0));
      display: flex; align-items: center; justify-content: center; gap: 12px; z-index: 10;
    }
    .total-label { color: rgba(255,255,255,.4); font-size: 13px; letter-spacing: 2px; }
    .total-value {
      color: #FFD700; font-size: 28px; font-weight: 800; letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(255,215,0,.3);
      transition: transform .15s cubic-bezier(.34,1.56,.64,1);
      min-width: 80px; text-align: center;
    }
    .total-value.pulse { transform: scale(1.15); }

    /* ---- 顶部信息 ---- */
    .combo-hint {
      position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.18); font-size: 11px; letter-spacing: 3px;
      pointer-events: none; text-align: center; white-space: nowrap;
    }
    @keyframes critShake {
      0%,100% { transform: translateX(-50%) translateY(0); }
      15%     { transform: translateX(calc(-50% + 6px)) translateY(-3px); }
      30%     { transform: translateX(calc(-50% - 5px)) translateY(2px); }
      45%     { transform: translateX(calc(-50% + 4px)) translateY(-1px); }
      60%     { transform: translateX(calc(-50% - 3px)) translateY(1px); }
      75%     { transform: translateX(calc(-50% + 2px)) translateY(0); }
      90%     { transform: translateX(calc(-50% - 1px)) translateY(0); }
    }

    .badge-wrap svg {
      width: min(65vw, 360px); height: auto; display: block;
      transform-origin: center center; cursor: pointer;
    }

    .shield-body  { fill: #D77757; }
    .shield-inlay { fill: #000000; }

    /* ---- 眨眼 ---- */
    .eye-group { transform-origin: var(--origin); }
    .eye-auto  { animation: blinkAuto 4s ease-in-out infinite; }
    @keyframes blinkAuto {
      0%,42% { transform: scaleY(1); }
      45%,48%{ transform: scaleY(0.08); }
      51%,100%{ transform: scaleY(1); }
    }
    .eye-click { animation: blinkClick .25s ease-in-out forwards; }
    @keyframes blinkClick {
      0% { transform: scaleY(1); } 40% { transform: scaleY(0.05); } 100% { transform: scaleY(1); }
    }

    /* ---- 脸红 ---- */
    .blush { opacity: 0; transition: opacity .35s; }
    .blush.show { opacity: .55; animation: blushIn .7s ease-out; }
    .blush.fade { opacity: 0; transition: opacity 1.2s ease-out; }
    @keyframes blushIn {
      0% { opacity: 0; r: 1; } 60% { opacity: .65; r: 8; } 100% { opacity: .55; r: 6; }
    }
  </style>
</head>
<body>

<div class="combo-hint" id="comboHint"></div>

<div class="badge-wrap" id="badge">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 183 93">
    <path class="shield-body" d="M49 9h84v28h14v14h-14v14h-7v14h-7v-14h-7v14h-7v-14h-28v14h-7v-14h-7v14h-7v-14h-7v-14h-14v-14h14V9Z"/>

    <g class="eye-group eye-auto" id="leftEye" style="--origin:66.5px 30px">
      <rect class="shield-inlay" x="63" y="23" width="7" height="14" rx="1.5"/>
    </g>
    <g class="eye-group eye-auto" id="rightEye" style="--origin:115.5px 30px">
      <rect class="shield-inlay" x="112" y="23" width="7" height="14" rx="1.5"/>
    </g>

    <ellipse class="blush" id="blushL" cx="55" cy="34" rx="6" ry="4.5" fill="#FF8C94"/>
    <ellipse class="blush" id="blushR" cx="128" cy="34" rx="6" ry="4.5" fill="#FF8C94"/>
  </svg>
</div>

<div class="total-bar">
  <span class="total-label">Tokens</span>
  <span class="total-value" id="totalDisplay">0</span>
</div>

<script>
const badge   = document.getElementById('badge');
const svg     = badge.querySelector('svg');
const leftEye  = document.getElementById('leftEye');
const rightEye = document.getElementById('rightEye');
const blushL   = document.getElementById('blushL');
const blushR   = document.getElementById('blushR');
const totalEl  = document.getElementById('totalDisplay');
const comboEl  = document.getElementById('comboHint');

let totalTokens  = 0;
let totalClicks  = 0;
let critsThisSession = 0;
let animId       = null;
let blushTimer   = null;

/* ====== 计分 (阶梯制) ====== */
function getPoints(clicks) {
  if (clicks < 10)  return 1;
  if (clicks < 20)  return 100;
  if (clicks < 30)  return 1000;
  if (clicks < 200) return 10000;
  // 200~399:10万, 400~999:100万, 1000~1999:1000万, 2000+:以此类推
  const tier = Math.floor(clicks / 200);
  return Math.pow(10, 5 + tier);
}

/* ====== 暴击 (高于基础分 6~99 倍) ====== */
function maybeCrit(clicks) {
  let chance = 0.08;
  if (clicks % 10 === 9) chance = 0.25;
  if (Math.random() < chance) {
    const base = getPoints(clicks);
    const nices = [6.66, 7.77, 8.88, 9.99, 16.66, 18.88, 66.6, 77.7, 88.8, 99.9];
    const mult  = nices[Math.floor(Math.random() * nices.length)];
    return Math.round(base * mult);
  }
  return 0;
}
function fmt(n) { return n.toLocaleString('en-US'); }

/* ====== 音效 ====== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playCoin(points) {
  ensureAudio(); const ctx = audioCtx; const t = ctx.currentTime;
  let notes;
  if (points >= 1e6)      notes = [988,1319,1760,2637];
  else if (points >= 1e5) notes = [988,1319,1760];
  else if (points >= 1e4) notes = [784,988,1319];
  else if (points >= 1e3) notes = [659,988];
  else if (points >= 100) notes = [784,1319];
  else                    notes = [988,1319];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = i === notes.length-1 ? 'triangle' : 'square';
    osc.frequency.value = freq;
    const s = t + i*0.06;
    gain.gain.setValueAtTime(0.15, s);
    gain.gain.exponentialRampToValueAtTime(0.01, s+0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(s); osc.stop(s+0.2);
  });
}

function playPop() {
  ensureAudio(); const ctx = audioCtx; const t = ctx.currentTime;
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(80, t+0.08);
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t+0.1);
}

/* ====== 浮动数字 ====== */
function spawnFloat(x, y, points) {
  const el = document.createElement('div'); el.className = 'float-num';
  el.textContent = '+' + fmt(points);
  let size, color;
  if (points >= 1e6)      { size=42; color='#FF4500'; }
  else if (points >= 1e5) { size=36; color='#FF6347'; }
  else if (points >= 1e4) { size=30; color='#FF8C00'; }
  else if (points >= 1e3) { size=26; color='#FFA500'; }
  else if (points >= 100) { size=22; color='#FFD700'; }
  else                    { size=18; color='#FFD700'; }
  el.style.cssText = `left:${x}px;top:${y}px;font-size:${size}px;color:${color};text-shadow:0 0 ${size/4}px ${color},0 2px 4px rgba(0,0,0,.5);`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

/* ====== 暴击浮动 —— 更大更炫 ====== */
function spawnFloatCrit(x, y, points) {
  const el = document.createElement('div'); el.className = 'float-num';
  const emojis = ['💥','🔥','⚡','🌟','💎','🎯','🦄','👑','🚀','💣'];
  const emoji = emojis[Math.floor(Math.random() * emojis.length)];
  el.textContent = emoji + ' +' + fmt(points);
  let size;
  if (points >= 1e7)       size = 48;
  else if (points >= 1e6)  size = 40;
  else if (points >= 1e5)  size = 34;
  else if (points >= 1e4)  size = 28;
  else                     size = 22;
  el.style.cssText = `
    left:${x}px;top:${y}px;font-size:${size}px;color:#FF4500;font-weight:900;
    text-shadow:0 0 ${size/2}px rgba(255,69,0,.8),0 0 ${size}px rgba(255,165,0,.5),0 3px 6px rgba(0,0,0,.6);
  `;
  el.style.animation = 'floatUpCrit .95s cubic-bezier(.15,.6,.35,1) forwards';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

/* ====== Token跳动 ====== */
function pulseTotal() {
  totalEl.classList.add('pulse');
  setTimeout(() => totalEl.classList.remove('pulse'), 150);
}

/* ====== 眨眼 ====== */
function triggerBlink() {
  leftEye.classList.remove('eye-auto');
  rightEye.classList.remove('eye-auto');
  leftEye.classList.add('eye-click');
  rightEye.classList.add('eye-click');
  setTimeout(() => {
    leftEye.classList.remove('eye-click');
    rightEye.classList.remove('eye-click');
    leftEye.classList.add('eye-auto');
    rightEye.classList.add('eye-auto');
  }, 260);
}

/* ====== 脸红 ====== */
function showBlush() {
  clearTimeout(blushTimer);
  blushL.classList.remove('fade','show');
  blushR.classList.remove('fade','show');
  void blushL.offsetWidth;
  blushL.classList.add('show'); blushR.classList.add('show');
  blushTimer = setTimeout(() => {
    blushL.classList.add('fade'); blushR.classList.add('fade');
    blushL.classList.remove('show'); blushR.classList.remove('show');
  }, 2200);
}

/* ====== Squash & Stretch ====== */
function animateBounce() {
  if (animId) cancelAnimationFrame(animId);
  const start = performance.now();
  const duration = 600;
  const keyframes = [
    [0,1,1],[20,.89,1.1],[50,.94,1.05],[80,.98,1.01],
    [120,1.07,.94],[160,1.09,.92],[200,1.05,.95],
    [250,.96,1.025],[300,1.03,.975],[350,1.01,.99],
    [400,.995,1.003],[500,1.001,.999],[600,1,1],
  ];
  function frame(now) {
    const e = now - start;
    if (e >= duration) { svg.style.transform = 'scale(1,1) translateY(0)'; animId=null; return; }
    let sy=1,sx=1;
    for (let i=0;i<keyframes.length-1;i++) {
      const [t0,y0,x0]=keyframes[i],[t1,y1,x1]=keyframes[i+1];
      if (e>=t0&&e<=t1){ const p=(e-t0)/(t1-t0); sy=y0+(y1-y0)*p; sx=x0+(x1-x0)*p; break; }
    }
    svg.style.transform = `scale(${sx},${sy}) translateY(${(1-sy)*35}px)`;
    animId = requestAnimationFrame(frame);
  }
  animId = requestAnimationFrame(frame);
}

/* ====== 点击 ====== */
badge.addEventListener('click', e => {
  totalClicks++;
  const points = getPoints(totalClicks);
  const crit   = maybeCrit(totalClicks);
  const earned = crit > 0 ? crit : points;
  totalTokens += earned;

  totalEl.textContent = fmt(totalTokens);
  pulseTotal();

  // 浮动数字
  if (crit > 0) {
    critsThisSession++;
    spawnFloatCrit(e.clientX, e.clientY-10, crit);
  } else {
    spawnFloat(e.clientX, e.clientY-10, points);
  }

  // 顶部提示
  if (crit > 0) {
    const critPhrases = [
      '💥 卧槽 暴击!!',
      '🔥 超级暴击!!!',
      '⚡ 天选暴击!!!',
      '🌟 欧皇暴击!!',
      '💎 完美暴击!!',
      '🎯 一击必暴!!!',
      '🦄 离谱暴击!!',
      '👑 帝王暴击!!',
      '🚀 起飞暴击!!',
      '💣 炸裂暴击!!',
    ];
    const idx = Math.floor(Math.random() * critPhrases.length);
    comboEl.textContent = critPhrases[idx] + ' +' + fmt(crit);
    comboEl.style.color = '#FF4500';
    comboEl.style.fontSize = '17px';
    comboEl.style.textShadow = '0 0 14px rgba(255,69,0,.7), 0 0 28px rgba(255,140,0,.4)';
    comboEl.style.fontWeight = '900';
    comboEl.style.animation = 'none';
    void comboEl.offsetWidth;
    comboEl.style.animation = 'critShake .35s ease-out';
  } else if (totalClicks % 10 === 0) {
    const comboPhrases = [
      totalClicks + ' 连击! 🎵',
      totalClicks + ' 连击! 🎶',
      totalClicks + ' 连击~ 继续!' ,
      totalClicks + ' 啪啪啪! 💪',
      '连击 ×10! 🔥',
      '手感火热! 🔥',
    ];
    comboEl.textContent = comboPhrases[(totalClicks/10) % comboPhrases.length];
    comboEl.style.color = 'rgba(255,215,0,.75)';
    comboEl.style.fontSize = '14px';
    comboEl.style.textShadow = '0 0 8px rgba(255,215,0,.3)';
    comboEl.style.fontWeight = 'normal';
  } else {
    comboEl.textContent = '第' + totalClicks + '下 · 每击+' + fmt(points);
    comboEl.style.color = 'rgba(255,255,255,.2)';
    comboEl.style.fontSize = '11px';
    comboEl.style.textShadow = 'none';
    comboEl.style.fontWeight = 'normal';
  }

  triggerBlink();
  showBlush();
  animateBounce();
  playCoin(earned);
  playPop();
});

comboEl.textContent = '👆 点我点我！';
comboEl.style.color = 'rgba(255,255,255,.25)';
comboEl.style.fontSize = '12px';
</script>

<script>
  if ('serviceWorker' in navigator) {
    // 先干掉所有旧 Service Worker
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    // 等待清理完毕再注册新的
    setTimeout(() => {
      navigator.serviceWorker.register('service-worker.js?v=4');
    }, 300);
  }
</script>
</body>
</html>
