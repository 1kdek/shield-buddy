<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Shield Buddy</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shield Buddy">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="点击盾牌小人，它会眨眼脸红弹跳！">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    /* ---- 粒子 ---- */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particleFly .7s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ---- 波纹 ---- */
    .ripple {
      position: fixed;
      pointer-events: none;
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 50%;
      animation: rippleOut .7s ease-out forwards;
    }
    @keyframes rippleOut {
      0%   { width: 0; height: 0; opacity: .8; }
      100% { width: 280px; height: 280px; opacity: 0; margin-left: -140px; margin-top: -140px; }
    }

    /* ---- 容器 ---- */
    .badge-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge-wrap svg {
      width: min(65vw, 360px);
      height: auto;
      display: block;
      transform-origin: center center;
    }

    /* ---- 颜色 ---- */
    .shield-body { fill: #D77757; }
    .shield-inlay { fill: #000000; }

    /* ---- 眼睛眨眼动画 ---- */
    .eye-group {
      transform-origin: var(--origin);
    }

    /* 自发眨眼：每 4 秒一次 */
    .eye-auto {
      animation: blinkAuto 4s ease-in-out infinite;
    }
    @keyframes blinkAuto {
      0%,   42%   { transform: scaleY(1); }
      45%,  48%   { transform: scaleY(0.08); }
      51%,  100%  { transform: scaleY(1); }
    }

    /* 点击强制眨眼 */
    .eye-click {
      animation: blinkClick .25s ease-in-out forwards;
    }
    @keyframes blinkClick {
      0%   { transform: scaleY(1); }
      40%  { transform: scaleY(0.05); }
      100% { transform: scaleY(1); }
    }

    /* ---- 脸红 ---- */
    .blush {
      opacity: 0;
      transition: opacity .35s;
    }
    .blush.show {
      opacity: .55;
      animation: blushIn .7s ease-out;
    }
    .blush.fade {
      opacity: 0;
      transition: opacity 1.2s ease-out;
    }
    @keyframes blushIn {
      0%   { opacity: 0; r: 1; }
      60%  { opacity: .65; r: 8; }
      100% { opacity: .55; r: 6; }
    }

    /* ---- 表情文字 ---- */
    .counter {
      position: fixed;
      top: 28px;
      right: 28px;
      color: rgba(255,255,255,.12);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
    }

    .hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.22);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 4px;
      pointer-events: none;
      animation: hintFade 2.2s ease-in-out infinite;
    }
    @keyframes hintFade {
      0%, 100% { opacity: .2; }
      50%      { opacity: .5; }
    }
  </style>
</head>
<body>

<div class="badge-wrap" id="badge">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 183 93">
    <!-- 盾牌主体 -->
    <path class="shield-body" d="M49 9h84v28h14v14h-14v14h-7v14h-7v-14h-7v14h-7v-14h-28v14h-7v-14h-7v14h-7v-14h-7v-14h-14v-14h14V9Z"/>

    <!-- 左眼 -->
    <g class="eye-group eye-auto" id="leftEye" style="--origin: 66.5px 30px">
      <rect class="shield-inlay" x="63" y="23" width="7" height="14" rx="1.5"/>
    </g>

    <!-- 右眼 -->
    <g class="eye-group eye-auto" id="rightEye" style="--origin: 115.5px 30px">
      <rect class="shield-inlay" x="112" y="23" width="7" height="14" rx="1.5"/>
    </g>

    <!-- 左脸红 -->
    <ellipse class="blush" id="blushL" cx="55" cy="34" rx="6" ry="4.5" fill="#FF8C94"/>

    <!-- 右脸红 -->
    <ellipse class="blush" id="blushR" cx="128" cy="34" rx="6" ry="4.5" fill="#FF8C94"/>
  </svg>
</div>

<div class="counter" id="counter">0</div>
<div class="hint">点击盾牌</div>

<script>
const badge   = document.getElementById('badge');
const svg     = badge.querySelector('svg');
const leftEye  = document.getElementById('leftEye');
const rightEye = document.getElementById('rightEye');
const blushL  = document.getElementById('blushL');
const blushR  = document.getElementById('blushR');
const cntEl   = document.getElementById('counter');
const hintEl  = document.querySelector('.hint');

let clicks    = 0;
let animId    = null;
let blushTimer = null;

/* ====== 粒子 ====== */
function spawnParticles(x, y, count = 14) {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < count; i++) {
    const p     = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / count + (Math.random() - .5) * .35;
    const dist  = 30 + Math.random() * 60;
    p.style.cssText = `
      left: ${x}px; top: ${y}px;
      width: ${2 + Math.random() * 4}px;
      height: ${2 + Math.random() * 4}px;
      background: #FF8C94;
      --dx: ${Math.cos(angle) * dist}px;
      --dy: ${Math.sin(angle) * dist}px;
    `;
    frag.appendChild(p);
  }
  document.body.appendChild(frag);
  setTimeout(() => document.querySelectorAll('.particle').forEach(el => el.remove()), 800);
}

/* ====== 波纹 ====== */
function spawnRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top  = y + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 800);
}

/* ====== 眨眼 ====== */
function triggerBlink() {
  // 暂停自动眨眼
  leftEye.classList.remove('eye-auto');
  rightEye.classList.remove('eye-auto');

  // 触发一次点击眨眼
  leftEye.classList.add('eye-click');
  rightEye.classList.add('eye-click');

  // 动画结束后恢复自动眨眼
  setTimeout(() => {
    leftEye.classList.remove('eye-click');
    rightEye.classList.remove('eye-click');
    leftEye.classList.add('eye-auto');
    rightEye.classList.add('eye-auto');
  }, 260);
}

/* ====== 脸红 ====== */
function showBlush() {
  clearTimeout(blushTimer);

  blushL.classList.remove('fade');
  blushR.classList.remove('fade');
  blushL.classList.remove('show');
  blushR.classList.remove('show');

  // reflow trick 让 animation 重新触发
  void blushL.offsetWidth;

  blushL.classList.add('show');
  blushR.classList.add('show');

  // 2 秒后渐隐
  blushTimer = setTimeout(() => {
    blushL.classList.add('fade');
    blushR.classList.add('fade');
    blushL.classList.remove('show');
    blushR.classList.remove('show');
  }, 2200);
}

/* ====== Squash & Stretch ====== */
function animateBounce() {
  if (animId) cancelAnimationFrame(animId);

  const start = performance.now();
  const duration = 900;

  const keyframes = [
    [0,     1.000,  1.000],
    [33,    0.885,  1.104],
    [66,    0.905,  1.080],
    [100,   0.960,  1.000],
    [133,   1.015,  0.975],
    [166,   1.050,  0.955],
    [200,   1.085,  0.932],
    [233,   1.070,  0.945],
    [266,   1.010,  0.985],
    [300,   0.955,  1.030],
    [333,   0.940,  1.045],
    [366,   1.020,  0.975],
    [400,   1.080,  0.940],
    [433,   1.110,  0.920],
    [466,   1.130,  0.893],
    [500,   1.085,  0.932],
    [533,   1.025,  0.970],
    [566,   0.975,  1.020],
    [600,   0.958,  1.035],
    [633,   1.008,  0.990],
    [666,   1.040,  0.962],
    [700,   1.035,  0.970],
    [733,   1.010,  0.990],
    [766,   0.995,  1.005],
    [800,   1.002,  0.998],
    [833,   1.001,  0.999],
    [900,   1.000,  1.000],
  ];

  function frame(now) {
    const elapsed = now - start;
    if (elapsed >= duration) {
      svg.style.transform = 'scale(1, 1) translateY(0)';
      animId = null;
      return;
    }
    let sy = 1, sx = 1;
    for (let i = 0; i < keyframes.length - 1; i++) {
      const [t0, y0, x0] = keyframes[i];
      const [t1, y1, x1] = keyframes[i + 1];
      if (elapsed >= t0 && elapsed <= t1) {
        const p = (elapsed - t0) / (t1 - t0);
        sy = y0 + (y1 - y0) * p;
        sx = x0 + (x1 - x0) * p;
        break;
      }
    }
    const ty = (1 - sy) * 45;
    svg.style.transform = `scale(${sx}, ${sy}) translateY(${ty}px)`;
    animId = requestAnimationFrame(frame);
  }

  animId = requestAnimationFrame(frame);
}

/* ====== 点击 ====== */
badge.addEventListener('click', e => {
  clicks++;
  cntEl.textContent = clicks;
  if (clicks === 1) hintEl.style.display = 'none';

  triggerBlink();
  showBlush();
  spawnParticles(e.clientX, e.clientY, 12);
  spawnRipple(e.clientX, e.clientY);
  animateBounce();
  navigator.vibrate?.(12);
});

/* ====== 长按 ====== */
let holdTimer;
badge.addEventListener('pointerdown', e => {
  holdTimer = setTimeout(() => {
    showBlush();
    spawnParticles(e.clientX, e.clientY, 30);
    spawnRipple(e.clientX, e.clientY);
    triggerBlink();
    svg.style.transition = 'transform .15s cubic-bezier(.34,1.56,.64,1)';
    svg.style.transform = 'scale(0.85, 0.85)';
    setTimeout(() => {
      svg.style.transition = 'transform .5s cubic-bezier(.34,1.56,.64,1)';
      svg.style.transform = 'scale(1, 1) translateY(0)';
    }, 150);
    navigator.vibrate?.(20);
  }, 350);
});
badge.addEventListener('pointerup',    () => clearTimeout(holdTimer));
badge.addEventListener('pointerleave', () => clearTimeout(holdTimer));
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>
</body>
</html>
